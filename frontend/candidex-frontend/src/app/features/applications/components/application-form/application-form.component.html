<h2 mat-dialog-title>{{ isEditMode ? 'Modifier la candidature' : 'Nouvelle candidature' }}</h2>

<div mat-dialog-content>
  <form [formGroup]="form" class="app-form">

    <!-- Informations principales -->
    <div class="form-section">
      <h3 class="section-label">Informations</h3>

      <div class="field full">
        <label>Entreprise <span class="req">*</span></label>
        <input type="text" formControlName="companyName" placeholder="ex: Google">
      </div>

      <div class="field full">
        <label>Intitulé du poste <span class="req">*</span></label>
        <input type="text" formControlName="roleTitle" placeholder="ex: Ingénieur logiciel">
      </div>

      <div class="row">
        <div class="field">
          <label>Type de contrat</label>
          <select formControlName="employmentType">
            <option value="">— Sélectionner —</option>
            <option value="CDI">CDI</option>
            <option value="CDD">CDD</option>
            <option value="INTERNSHIP">Stage</option>
            <option value="ALTERNANCE">Alternance</option>
            <option value="FREELANCE">Freelance</option>
          </select>
        </div>
        <div class="field">
          <label>Source <span class="req">*</span></label>
          <select formControlName="source">
            <option value="LINKEDIN">LinkedIn</option>
            <option value="COMPANY_WEBSITE">Site entreprise</option>
            <option value="REFERRAL">Recommandation</option>
            <option value="JOB_BOARD">Site d'emploi</option>
            <option value="EMAIL">Email</option>
            <option value="SCHOOL_FORUM">Forum école</option>
            <option value="OTHER">Autre</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>Statut <span class="req">*</span></label>
          <select formControlName="status">
            <option value="APPLIED">Candidature envoyée</option>
            <option value="HR_INTERVIEW">Entretien RH</option>
            <option value="TECH_INTERVIEW">Entretien technique</option>
            <option value="OFFER">Offre reçue</option>
            <option value="REJECTED">Refusée</option>
            <option value="GHOSTED">Sans réponse</option>
          </select>
        </div>
        <div class="field">
          <label>Date de candidature</label>
          <input type="date" formControlName="appliedDate">
        </div>
      </div>
    </div>

    <!-- Localisation -->
    <div class="form-section">
      <h3 class="section-label">Localisation</h3>
      <div class="row">
        <div class="field">
          <label>Ville</label>
          <input type="text" formControlName="city" placeholder="ex: Paris">
        </div>
        <div class="field">
          <label>Pays</label>
          <input type="text" formControlName="country" placeholder="ex: France">
        </div>
      </div>
    </div>

    <!-- Rémunération -->
    <div class="form-section">
      <h3 class="section-label">Rémunération</h3>
      <div class="row triple">
        <div class="field">
          <label>Salaire</label>
          <input type="number" formControlName="salary" placeholder="ex: 45000" min="0">
        </div>
        <div class="field">
          <label>Devise</label>
          <select formControlName="currency">
            <option value="EUR">EUR</option>
            <option value="USD">USD</option>
            <option value="GBP">GBP</option>
            <option value="CAD">CAD</option>
            <option value="MAD">MAD</option>
          </select>
        </div>
        <div class="field">
          <label>Période</label>
          <select formControlName="salaryPeriod">
            <option value="">—</option>
            <option value="ANNUAL">Annuel</option>
            <option value="MONTHLY">Mensuel</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Notes -->
    <div class="form-section">
      <h3 class="section-label">Notes</h3>
      <div class="field">
        <textarea formControlName="notes" rows="3" placeholder="Ajoutez des notes..."></textarea>
      </div>
    </div>

  </form>
</div>

<div mat-dialog-actions align="end">
  <button type="button" class="btn-cancel" (click)="onCancel()">Annuler</button>
  <button type="button" class="btn-primary" [disabled]="form.invalid || isSubmitting" (click)="onSubmit()">
    {{ isSubmitting ? 'Enregistrement...' : (isEditMode ? 'Modifier' : 'Créer') }}
  </button>
</div>
